services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: geo-transit-postgis
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: geotransit
      POSTGRES_USER: geoadmin
      POSTGRES_PASSWORD: geopassword
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - geo-net

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      - postgis
    networks:
      - geo-net

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "5174:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - geo-net

networks:
  geo-net:
    driver: bridge

volumes:
  pgdata:
